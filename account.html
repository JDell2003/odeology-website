<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account · odeology_</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body.account-page {
      overflow: auto !important;
    }
    .account-main {
      max-width: 920px;
      margin: calc(var(--navbar-height, 72px) + 26px) auto 40px;
      padding: 0 16px 20px;
    }
    .account-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 16px;
      position: relative;
    }
    .account-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }
    .account-row-main {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .account-avatar {
      width: 64px;
      height: 64px;
      position: relative;
      border-radius: 999px;
      overflow: visible;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: rgba(0, 0, 0, 0.06);
      display: grid;
      place-items: center;
      flex: 0 0 64px;
    }
    .account-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 999px;
    }
    .account-fallback {
      font-weight: 800;
      font-size: 1rem;
      color: #333;
    }
    .account-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: #111;
    }
    .account-friends {
      margin-top: 4px;
      font-size: 0.9rem;
      color: #666;
    }
    .account-status {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }
    .account-requests-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.34rem 0.62rem;
      border: 1px solid rgba(15, 36, 53, 0.2);
      border-radius: 999px;
      background: rgba(15, 36, 53, 0.04);
      color: #0f2435;
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      cursor: pointer;
      flex: 0 0 auto;
      transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease, transform 140ms ease;
    }
    .account-requests-btn:hover {
      background: rgba(15, 36, 53, 0.09);
      transform: translateY(-1px);
    }
    .account-requests-btn:focus-visible {
      outline: 2px solid rgba(19, 92, 152, 0.45);
      outline-offset: 1px;
    }
    .account-requests-btn.has-pending {
      border-color: rgba(214, 40, 40, 0.45);
    }
    .account-requests-btn.is-pinging {
      border-color: rgba(214, 40, 40, 0.75);
      box-shadow: 0 0 0 3px rgba(214, 40, 40, 0.16);
      animation: accountReqPing 700ms ease-out 2;
    }
    @keyframes accountReqPing {
      0% { transform: translateY(0) scale(1); }
      45% { transform: translateY(-1px) scale(1.03); }
      100% { transform: translateY(0) scale(1); }
    }
    .account-requests-count {
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.67rem;
      font-weight: 900;
      color: #fff;
      background: #d62828;
      border: 1px solid rgba(255, 255, 255, 0.65);
      line-height: 1;
    }
    .account-requests-popover {
      position: absolute;
      right: 16px;
      top: 86px;
      z-index: 4;
      width: min(380px, calc(100vw - 52px));
      border-radius: 14px;
      border: 1px solid rgba(12, 36, 53, 0.2);
      background: rgba(251, 253, 255, 0.98);
      box-shadow: 0 18px 40px rgba(5, 18, 28, 0.2);
      overflow: hidden;
    }
    .account-requests-popover.hidden {
      display: none;
    }
    .account-req-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid rgba(12, 36, 53, 0.12);
    }
    .account-req-tab {
      border: 0;
      border-right: 1px solid rgba(12, 36, 53, 0.12);
      background: rgba(16, 43, 63, 0.04);
      color: #153447;
      padding: 0.62rem 0.72rem;
      font-size: 0.85rem;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.36rem;
      cursor: pointer;
    }
    .account-req-tab:last-child {
      border-right: 0;
    }
    .account-req-tab.active {
      background: rgba(16, 43, 63, 0.11);
      color: #0b2232;
    }
    .account-req-tab-count {
      min-width: 16px;
      height: 16px;
      padding: 0 5px;
      border-radius: 999px;
      background: rgba(214, 40, 40, 0.9);
      color: #fff;
      font-size: 0.63rem;
      font-weight: 900;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .account-req-status {
      min-height: 1.2rem;
      padding: 0.5rem 0.75rem 0;
      font-size: 0.72rem;
      font-weight: 700;
      color: rgba(13, 34, 50, 0.68);
    }
    .account-req-list {
      max-height: min(52vh, 360px);
      overflow-y: auto;
      padding: 0.48rem 0.6rem 0.62rem;
      display: grid;
      gap: 0.4rem;
    }
    .account-req-item {
      border: 1px solid rgba(12, 36, 53, 0.14);
      border-radius: 11px;
      padding: 0.56rem 0.58rem;
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      align-items: center;
      background: rgba(255, 255, 255, 0.95);
    }
    .account-req-item-name {
      font-size: 0.84rem;
      font-weight: 900;
      color: #0e2738;
    }
    .account-req-item-sub {
      font-size: 0.72rem;
      color: rgba(13, 34, 50, 0.72);
    }
    .account-req-actions {
      display: inline-flex;
      gap: 0.35rem;
    }
    .account-req-action {
      border: 1px solid rgba(12, 36, 53, 0.2);
      border-radius: 8px;
      background: rgba(16, 43, 63, 0.05);
      color: #0d2232;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 0.34rem 0.46rem;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
    }
    .account-req-action:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
      box-shadow: 0 8px 16px rgba(12, 36, 53, 0.12);
    }
    .account-req-action:disabled {
      opacity: 0.55;
      cursor: default;
      transform: none;
      box-shadow: none;
    }
    .account-req-action.accept {
      border-color: rgba(35, 134, 54, 0.35);
      color: #1a6d2a;
      background: rgba(35, 134, 54, 0.09);
    }
    .account-req-action.reject {
      border-color: rgba(214, 40, 40, 0.35);
      color: #a11e1e;
      background: rgba(214, 40, 40, 0.08);
    }
    .account-req-empty {
      border: 1px dashed rgba(12, 36, 53, 0.2);
      border-radius: 11px;
      padding: 0.68rem 0.72rem;
      font-size: 0.76rem;
      font-weight: 700;
      color: rgba(13, 34, 50, 0.72);
      background: rgba(255, 255, 255, 0.92);
    }
    .account-requests-ping {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 60;
      border: 1px solid rgba(10, 35, 54, 0.24);
      border-left: 4px solid rgba(214, 40, 40, 0.86);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.98);
      color: #0e2738;
      min-width: min(360px, calc(100vw - 28px));
      text-align: left;
      padding: 0.58rem 0.72rem;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 160ms ease, transform 160ms ease;
    }
    .account-requests-ping.show {
      opacity: 1;
      transform: translateY(0);
    }
    .account-requests-ping-title {
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.02em;
    }
    .account-requests-ping-sub {
      margin-top: 0.12rem;
      font-size: 0.74rem;
      color: rgba(13, 34, 50, 0.76);
      font-weight: 700;
    }
    @media (max-width: 640px) {
      .account-row {
        align-items: flex-start;
      }
      .account-requests-btn {
        font-size: 0.8rem;
        padding: 0.32rem 0.58rem;
      }
      .account-requests-popover {
        right: 10px;
        left: 10px;
        top: 88px;
        width: auto;
      }
      .account-requests-ping {
        right: 10px;
        left: 10px;
        min-width: 0;
      }
    }
    .account-grid {
      display: grid;
      gap: 14px;
    }
    .account-warnings-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .account-warnings-head h2 {
      margin: 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #222;
    }
    .account-warnings-status {
      font-size: 12px;
      color: #666;
    }
    .account-warnings-list {
      display: grid;
      gap: 8px;
    }
    .account-warning-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      border-radius: 12px;
      border: 1px solid rgba(197, 141, 79, 0.35);
      background: rgba(197, 141, 79, 0.1);
      padding: 10px;
    }
    .account-warning-meta {
      display: grid;
      gap: 2px;
    }
    .account-warning-name {
      font-weight: 800;
      color: #1f1a16;
      font-size: 0.92rem;
    }
    .account-warning-text {
      color: #4a3c2f;
      font-size: 0.85rem;
    }
    .account-warning-contacts {
      margin-top: 4px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .account-warning-contact {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid rgba(120, 80, 38, 0.35);
      background: rgba(255, 255, 255, 0.72);
      color: #5a3b1e;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      line-height: 1.2;
    }
    .account-warning-contact:hover {
      border-color: rgba(120, 80, 38, 0.55);
      background: rgba(255, 255, 255, 0.9);
      color: #3f2812;
    }
    .account-warning-severity {
      border: 1px solid rgba(0, 0, 0, 0.12);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: #2f2214;
      background: rgba(255, 255, 255, 0.5);
    }
    .account-warnings-empty {
      border: 1px dashed rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      color: #666;
      padding: 10px;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.03);
    }
  </style>
</head>
<body class="account-page" data-require-auth="1">
  <div class="grain"></div>

  <svg aria-hidden="true" class="icon-sprite">
    <symbol id="icon-account" viewBox="0 0 24 24">
      <path d="M4.75 5.75a1 1 0 0 1 1-1h6.5a1 1 0 0 1 1 1v2.5"></path>

      <path d="M15.5 12H7.5"></path>

    <symbol id="icon-calendar-check" viewBox="0 0 24 24">

      <path d="M9 4.5v3M15 4.5v3M8.75 12.5l2.25 2 4-4"></path>
    </symbol>
    <symbol id="icon-users" viewBox="0 0 24 24">
      <circle cx="10" cy="9" r="2.5"></circle>

    </symbol>
  </svg>

  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-brand">odeology_<span class="brand-dot"></span></div>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html#resources">Home</a></li>
        <li><a href="overview.html">Overview</a></li>

      </ul>
    </div>
  </nav>

  <aside class="control-panel" id="control-panel">
    <div class="control-panel-header"></div>
    <div class="control-section" data-auth-section="1">
      <p class="section-label">ACCOUNT</p>
      <button class="control-link active" id="control-signin" type="button" aria-current="true">
        <span class="icon"><svg><use href="#icon-account"></use></svg></span>
        <span class="text">Account</span>
      </button>
      <button class="control-link hidden" id="control-signup" type="button">
        <span class="icon"><svg><use href="#icon-account"></use></svg></span>
        <span class="text">Sign up</span>
      </button>
    </div>
    <div class="control-section">
      <p class="section-label">HELP</p>
      <button class="control-link" id="control-tour" type="button"><span class="icon"><svg><use href="#icon-book"></use></svg></span><span class="text">Quick tour</span></button>
    </div>
    <div class="control-section">
      <p class="section-label">DASH</p>
      <div class="control-pill-row">
        <button class="control-link control-checkin-pill coming-soon-item is-locked coming-soon-link" id="control-checkin" type="button" aria-disabled="true">
          <span class="icon"><svg><use href="#icon-calendar-check"></use></svg></span>
          <span class="text">Dash<span class="control-sub">Coming soon</span></span>
        </button>
      </div>
    </div>
    <div class="control-section">
      <p class="section-label">TRAINING PORTAL</p>
      <a class="control-link" href="overview.html"><span class="icon"><svg><use href="#icon-book"></use></svg></span><span class="text">Overview</span></a>
      <a class="control-link" href="training.html"><span class="icon"><svg><use href="#icon-folder"></use></svg></span><span class="text">Training Program</span></a>
      <a class="control-link" href="grocery-calendar.html"><span class="icon"><svg><use href="#icon-calendar-check"></use></svg></span><span class="text">Grocery Calendar</span></a>
    </div>
    <div class="control-section">
      <p class="section-label">COMMUNITY</p>
      <a class="control-link" href="leaderboard.html"><span class="icon"><svg><use href="#icon-users"></use></svg></span><span class="text">Leaderboard</span></a>
      <a class="control-link" href="friends.html"><span class="icon"><svg><use href="#icon-users"></use></svg></span><span class="text">Messages</span></a>
      <a class="control-link" href="coaches.html"><span class="icon"><svg><use href="#icon-users"></use></svg></span><span class="text">Coaches</span></a>
    </div>
  </aside>

  <main class="account-main">
    <div class="account-grid">
      <section class="account-card">
        <div class="account-row">
          <div class="account-row-main">
            <div class="account-avatar" id="account-avatar"></div>
            <div>
              <div class="account-name" id="account-name">Account</div>
              <div class="account-friends" id="account-friends">0 friends</div>
            </div>
          </div>
          <button type="button" class="account-requests-btn hidden" id="account-requests-btn" aria-label="Requests">
            <span>Requests</span>
            <span class="account-requests-count hidden" id="account-requests-count">0</span>
          </button>
        </div>
        <div class="account-requests-popover hidden" id="account-requests-popover" aria-hidden="true">
          <div class="account-req-tabs" role="tablist" aria-label="Request types">
            <button type="button" class="account-req-tab active" data-req-tab="workout" role="tab" aria-selected="true">Workout <span class="account-req-tab-count" id="account-req-workout-count">0</span></button>
            <button type="button" class="account-req-tab" data-req-tab="friends" role="tab" aria-selected="false">Friends <span class="account-req-tab-count" id="account-req-friends-count">0</span></button>
          </div>
          <div class="account-req-status" id="account-req-status"></div>
          <div class="account-req-list" id="account-req-list"></div>
        </div>
        <div class="account-status" id="account-status"></div>
      </section>

      <section class="account-card">
        <div class="account-warnings-head">
          <h2>Warnings</h2>
          <div class="account-warnings-status" id="account-warnings-status">Checking warnings...</div>
        </div>
        <div class="account-warnings-list" id="account-warnings-list"></div>
      </section>
    </div>
  </main>

  <script src="js/main.js?v=2026-03-08-auth-persist-1"></script>
  <script src="js/account.js?v=2026-03-08-warning-contacts-2"></script>
</body>
</html>
