<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | ODEOLOGY</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--ink);
    }
    .reset-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(12, 10, 8, 0.96);
      padding: 1.2rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }
    :root[data-theme="light"] .reset-card {
      background: rgba(255, 255, 255, 0.96);
    }
    .reset-head {
      margin: 0 0 0.45rem;
      font-size: 1.25rem;
    }
    .reset-sub {
      margin: 0 0 0.9rem;
      color: var(--muted);
    }
    .reset-form {
      display: grid;
      gap: 0.55rem;
    }
    .reset-status {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .reset-status.error {
      color: #ff9b9b;
    }
  </style>
</head>
<body>
  <div class="reset-card">
    <h1 class="reset-head">Set your new password</h1>
    <p class="reset-sub">Choose a new password for your account.</p>
    <form id="reset-form" class="reset-form">
      <label class="auth-label" for="reset-password">New password</label>
      <input id="reset-password" class="auth-input" type="password" minlength="8" maxlength="128" autocomplete="new-password" required>
      <label class="auth-label" for="reset-password-confirm">Confirm password</label>
      <input id="reset-password-confirm" class="auth-input" type="password" minlength="8" maxlength="128" autocomplete="new-password" required>
      <button type="submit" class="btn btn-primary">Reset password</button>
      <p id="reset-status" class="reset-status"></p>
    </form>
  </div>

  <script>
    (function () {
      const form = document.getElementById('reset-form');
      const pass = document.getElementById('reset-password');
      const pass2 = document.getElementById('reset-password-confirm');
      const status = document.getElementById('reset-status');
      const params = new URLSearchParams(window.location.search);
      const token = String(params.get('token') || '').trim();

      const setStatus = (message, isError) => {
        status.textContent = String(message || '');
        status.classList.toggle('error', Boolean(isError));
      };

      if (!token) {
        setStatus('This reset link is invalid. Request a new one from Sign in.', true);
        form.querySelector('button[type="submit"]').disabled = true;
        return;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        setStatus('', false);
        const p1 = String(pass.value || '');
        const p2 = String(pass2.value || '');
        if (!p1 || p1.length < 8) {
          setStatus('Password must be at least 8 characters.', true);
          return;
        }
        if (p1 !== p2) {
          setStatus('Passwords do not match.', true);
          return;
        }

        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        try {
          const resp = await fetch('/api/auth/password/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ token, password: p1 })
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) {
            setStatus(data?.error || 'Could not reset password.', true);
            return;
          }
          setStatus('Password updated. You can sign in now.', false);
          window.setTimeout(() => { window.location.href = '/index.html'; }, 1200);
        } catch (err) {
          setStatus(err?.message || 'Could not reset password.', true);
        } finally {
          submitBtn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
